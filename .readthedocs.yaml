version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  commands:
    - pip install maturin
    - maturin build --out dist
    - pip install dist/*.whl
    - pip install mkdocs mkdocs-material mkdocstrings[python]
    - mkdocs build --site-dir $READTHEDOCS_OUTPUT/html

mkdocs:
   configuration: mkdocs.yml