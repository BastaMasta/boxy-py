site_name: boxy-py
site_description: Python bindings for boxy-cli — styled terminal boxes in Python
site_url: https://boxy-py.readthedocs.io
repo_url: https://github.com/BastaMasta/boxy-py
repo_name: BastaMasta/boxy-py

theme:
  name: material
  palette:
    scheme: slate
    primary: cyan
    accent: cyan
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: google
            show_source: false

markdown_extensions:
  - pymdownx.snippets

nav:
  - Home: index.md
  - API Reference: api.md
